name: Unzip xiaomi/stone/ and Commit

on:
  workflow_dispatch:

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download DeviceTree_3.zip from TENIRE pan direct link
        run: |
          curl -L -A "Mozilla/5.0" -o DeviceTree_3.zip "https://pan.tenire.com/down.php/c6bc8d868902bbce438a20359e187c47.zip"

      - name: Check downloaded file (for debug)
        run: |
          file DeviceTree_3.zip
          head -c 200 DeviceTree_3.zip | hexdump -C

      - name: Set up unzip tool
        run: sudo apt-get install -y unzip

      - name: Unzip DeviceTree_3.zip
        run: |
          unzip -o DeviceTree_3.zip "xiaomi/stone/*" -d extracted

      - name: Copy xiaomi/stone/ contents to repo root
        run: |
          cp -rf extracted/xiaomi/stone/* .

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "解压 DeviceTree_3.zip 并添加 xiaomi/stone/ 文件" || echo "No changes to commit"
          git push
